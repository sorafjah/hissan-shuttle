<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ひっ算シャトルラン</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=BIZ+UDPGothic:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    html, body {
      font-family: 'BIZ UDPGothic', 'BIZ UDGothic', 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', system-ui, sans-serif;
      background-color: #FAF6EB;
      /* スクロール許可 */
      overflow-x: hidden;
      overflow-y: auto;
      height: 100%;
    }

    .tabular-numbers {
      font-variant-numeric: tabular-nums;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    .key-button {
      transition: all 0.1s ease;
    }
    .key-button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0px rgba(0,0,0,0.1) !important;
    }

    /* ゲーム画面はスクロールしない（全体を画面内に収める） */
    #game-screen {
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 設定画面はスクロール可能 */
    #settings-screen {
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* ゲームオーバー画面 */
    #gameover-screen {
      min-height: 100dvh;
    }
  </style>
</head>
<body class="text-[#303550]">

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Web Audio API ---
    let audioCtx = null;

    const initAudio = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    };

    const playPilorin = (pitchFactor = 1.0) => {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();
      osc1.type = 'triangle';
      osc1.frequency.setValueAtTime(329.63 * pitchFactor, now);
      gain1.gain.setValueAtTime(0.12, now);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc1.connect(gain1);
      gain1.connect(audioCtx.destination);
      osc1.start(now);
      osc1.stop(now + 0.1);
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(440.00 * pitchFactor, now + 0.06);
      osc2.frequency.exponentialRampToValueAtTime(493.88 * pitchFactor, now + 0.25);
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.setValueAtTime(0.15, now + 0.06);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now + 0.06);
      osc2.stop(now + 0.4);
    };

    const playCorrect = () => {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, idx) => {
        const start = now + idx * 0.09;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.22, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.55);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 0.55);
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq * 2, start);
        gain2.gain.setValueAtTime(0.0001, start);
        gain2.gain.exponentialRampToValueAtTime(0.06, start + 0.02);
        gain2.gain.exponentialRampToValueAtTime(0.0001, start + 0.3);
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.start(start);
        osc2.stop(start + 0.3);
      });
    };

    const playIncorrect = () => {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(110, now + 0.35);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.35);
    };

    const playGameOverSound = () => {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(260, now);
      osc.frequency.linearRampToValueAtTime(130, now + 0.8);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.8);
    };

    // クリア音（全問クリア）
    const playClearSound = () => {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1046.50];
      notes.forEach((freq, idx) => {
        const start = now + idx * 0.12;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.28, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.7);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 0.7);
      });
    };

    // --- △▽ボタン付き数値入力 ---
    function NumberSelector({ label, value, onChange, min = 1, max = 999 }) {
      return (
        <div className="flex items-center gap-2">
          <span className="text-sm font-bold text-slate-500 w-8 text-right">{label}</span>
          <div className="flex items-center bg-white border border-amber-200 rounded-xl overflow-hidden shadow-sm">
            <button type="button" onClick={() => { if (value > min) onChange(value - 1); }}
              className="px-2.5 py-1 bg-amber-50 text-amber-700 hover:bg-amber-100 font-bold text-base active:scale-95 transition-transform">▽</button>
            <input type="number" value={value}
              onChange={e => { const v = parseInt(e.target.value); if (!isNaN(v)) onChange(Math.min(max, Math.max(min, v))); else if (e.target.value === '') onChange(''); }}
              onBlur={() => { if (value === '') onChange(min); }}
              className="w-12 text-center font-bold text-base text-slate-700 outline-none tabular-numbers" />
            <button type="button" onClick={() => { if (value < max) onChange(value + 1); }}
              className="px-2.5 py-1 bg-amber-50 text-amber-700 hover:bg-amber-100 font-bold text-base active:scale-95 transition-transform">△</button>
          </div>
        </div>
      );
    }

    // --- メインアプリ ---
    function App() {
      // 設定ステート
      // operator: '+', '-', '+-'（たすひく混合）, 'x'
      const [operator, setOperator] = useState('+');
      const [upperMin, setUpperMin] = useState(10);
      const [upperMax, setUpperMax] = useState(30);
      const [lowerMin, setLowerMin] = useState(1);
      const [lowerMax, setLowerMax] = useState(9);
      const [isSpeedUp, setIsSpeedUp] = useState(true);
      const [showProgressBar, setShowProgressBar] = useState(true);
      const [answerMode, setAnswerMode] = useState('selectDigit');
      // 問題数設定（一定速度のときのみ有効）
      const [questionLimit, setQuestionLimit] = useState(10); // 数値 or null（制限なし）
      const baseInterval = 1.5;

      // ゲーム進行
      const [gameState, setGameState] = useState('settings');
      const [score, setScore] = useState(0);
      const [lostCount, setLostCount] = useState(0);
      const [speedLevel, setSpeedLevel] = useState(1);
      const [currentInterval, setCurrentInterval] = useState(1.5);
      const [isCleared, setIsCleared] = useState(false); // 全問クリアフラグ

      // 問題管理
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [userInput, setUserInput] = useState([]);
      const [activeDigitIndex, setActiveDigitIndex] = useState(null);
      const [beatCount, setBeatCount] = useState(0);
      const [showHint, setShowHint] = useState(false);
      const [hasHint, setHasHint] = useState(false);
      const [subHints, setSubHints] = useState({ slashed: [], reducedVal: [], borrowTop: [] });

      // ビジュアル
      const [showSuccess, setShowSuccess] = useState(false);
      const [flashRed, setFlashRed] = useState(false);

      // かけ算選択時の下の段桁数制限
      useEffect(() => {
        if (operator === 'x') {
          if (lowerMax > 9) setLowerMax(9);
          if (lowerMin > 9) setLowerMin(9);
        }
      }, [operator]);

      // 設定変更（min<=max維持）
      const handleUpperMinChange = v => { setUpperMin(v); if (upperMax !== '' && v > upperMax) setUpperMax(v); };
      const handleUpperMaxChange = v => { setUpperMax(v); if (upperMin !== '' && v < upperMin) setUpperMin(v); };
      const handleLowerMinChange = v => { setLowerMin(v); if (lowerMax !== '' && v > lowerMax) setLowerMax(v); };
      const handleLowerMaxChange = v => { setLowerMax(v); if (lowerMin !== '' && v < lowerMin) setLowerMin(v); };

      // ひき算繰り下がりヒント
      const calculateSubHints = (num1, num2, digits) => {
        const str1 = num1.toString().split('').reverse();
        const str2 = num2.toString().split('').reverse();
        const slashed = Array(digits).fill(false);
        const roundedVal = Array(digits).fill(null);
        const borrowTop = Array(digits).fill(null);
        let tempA = [...str1].map(x => parseInt(x || '0'));
        for (let i = 0; i < digits; i++) {
          const d1 = tempA[i];
          const d2 = parseInt(str2[i] || '0');
          if (d1 < d2) {
            borrowTop[i] = 10;
            let j = i + 1;
            while (j < digits) {
              slashed[j] = true;
              if (tempA[j] > 0) { tempA[j] -= 1; roundedVal[j] = tempA[j]; break; }
              else { tempA[j] = 9; roundedVal[j] = 9; j++; }
            }
          }
        }
        return { slashed, reducedVal: roundedVal, borrowTop };
      };

      const analyzeQuestion = (num1, num2, op, digits) => {
        const str1 = num1.toString().split('').reverse();
        const str2 = num2.toString().split('').reverse();
        let hasCarryOrBorrow = false;
        let carryInfo = Array(digits).fill(0);
        let subHintsObj = { slashed: [], reducedVal: [], borrowTop: [] };
        if (op === '+') {
          let carry = 0;
          for (let i = 0; i < digits; i++) {
            const sum = parseInt(str1[i] || '0') + parseInt(str2[i] || '0') + carry;
            if (sum >= 10) { carry = Math.floor(sum / 10); if (i + 1 < digits) { carryInfo[i + 1] = carry; hasCarryOrBorrow = true; } }
            else { carry = 0; }
          }
        } else if (op === '-') {
          subHintsObj = calculateSubHints(num1, num2, digits);
          hasCarryOrBorrow = subHintsObj.slashed.some(x => x === true);
        } else if (op === 'x') {
          let carry = 0;
          for (let i = 0; i < digits; i++) {
            const prod = parseInt(str1[i] || '0') * num2 + carry;
            if (prod >= 10) { carry = Math.floor(prod / 10); if (i + 1 < digits) { carryInfo[i + 1] = carry; hasCarryOrBorrow = true; } }
            else { carry = 0; }
          }
        }
        return { hasCarryOrBorrow, carryInfo, subHintsObj };
      };

      // 問題生成
      const generateQuestion = () => {
        let uMin = parseInt(upperMin) || 10;
        let uMax = parseInt(upperMax) || 30;
        let lMin = parseInt(lowerMin) || 1;
        let lMax = parseInt(lowerMax) || 9;
        if (uMin > uMax) [uMin, uMax] = [uMax, uMin];
        if (lMin > lMax) [lMin, lMax] = [lMax, lMin];

        let num1 = Math.floor(Math.random() * (uMax - uMin + 1)) + uMin;
        let num2 = Math.floor(Math.random() * (lMax - lMin + 1)) + lMin;

        // 実際の演算子を決定（たすひくの場合はランダムに選ぶ）
        let actualOp = operator;
        if (operator === '+-') {
          actualOp = Math.random() < 0.5 ? '+' : '-';
        }

        if (actualOp === '-' && num1 < num2) [num1, num2] = [num2, num1];

        let answer = 0;
        if (actualOp === '+') answer = num1 + num2;
        if (actualOp === '-') answer = num1 - num2;
        if (actualOp === 'x') answer = num1 * num2;

        const maxDigits = Math.max(
          num1.toString().length,
          num2.toString().length,
          answer.toString().length
        );

        const { hasCarryOrBorrow, carryInfo, subHintsObj } = analyzeQuestion(num1, num2, actualOp, maxDigits);
        setHasHint(hasCarryOrBorrow);
        setShowHint(false);
        setSubHints(subHintsObj);
        setCurrentQuestion({ num1, num2, operator: actualOp, answer, maxDigits, carryInfo });
        setUserInput(Array(maxDigits).fill(''));
        setActiveDigitIndex(null);
        setBeatCount(0);
      };

      // ゲームスタート
      const startGame = () => {
        initAudio();
        setScore(0);
        setLostCount(0);
        setSpeedLevel(1);
        setCurrentInterval(baseInterval);
        setIsCleared(false);
        setGameState('playing');
        setTimeout(() => { generateQuestion(); }, 100);
      };

      // タイマーループ
      useEffect(() => {
        if (gameState !== 'playing' || showSuccess || !currentQuestion) return;
        let timerId = null;
        const tick = () => {
          setBeatCount(prev => {
            const next = prev + 1;
            if (next <= 10) {
              playPilorin(1.0 + (next - 1) * 0.05);
              timerId = setTimeout(tick, currentInterval * 1000);
              return next;
            } else {
              handleTimeout();
              return 0;
            }
          });
        };
        timerId = setTimeout(tick, currentInterval * 1000);
        return () => { if (timerId) clearTimeout(timerId); };
      }, [gameState, currentQuestion, currentInterval, showSuccess]);

      useEffect(() => {
        if (gameState === 'playing') {
          const currentLvl = isSpeedUp ? speedLevel : 1;
          const calculated = baseInterval * Math.pow(0.92, currentLvl - 1);
          setCurrentInterval(Math.max(1.0, calculated));
        }
      }, [speedLevel, baseInterval, gameState, isSpeedUp]);

      const handleTimeout = () => {
        playIncorrect();
        setFlashRed(true);
        setTimeout(() => setFlashRed(false), 500);
        setLostCount(prev => {
          const next = prev + 1;
          if (next >= 3) {
            setTimeout(() => { playGameOverSound(); setGameState('gameover'); }, 400);
          } else {
            setTimeout(() => { generateQuestion(); }, 800);
          }
          return next;
        });
      };

      // テンキー入力
      const handleNumberInput = (num) => {
        if (!currentQuestion) return;
        if (answerMode === 'directInput') {
          const currentStr = userInput.slice().reverse().filter(x => x !== '').join('');
          if (currentStr.length >= currentQuestion.maxDigits) return;
          const nextStr = currentStr + num.toString();
          const nextInput = Array(currentQuestion.maxDigits).fill('');
          const chars = nextStr.split('').reverse();
          for (let i = 0; i < currentQuestion.maxDigits; i++) nextInput[i] = chars[i] || '';
          setUserInput(nextInput);
        } else {
          if (activeDigitIndex === null) return;
          setUserInput(prev => { const n = [...prev]; n[activeDigitIndex] = num.toString(); return n; });
        }
      };

      const handleClear = () => {
        if (!currentQuestion) return;
        if (answerMode === 'directInput') {
          const currentStr = userInput.slice().reverse().filter(x => x !== '').join('');
          if (currentStr.length === 0) return;
          const nextStr = currentStr.slice(0, -1);
          const nextInput = Array(currentQuestion.maxDigits).fill('');
          const chars = nextStr.split('').reverse();
          for (let i = 0; i < currentQuestion.maxDigits; i++) nextInput[i] = chars[i] || '';
          setUserInput(nextInput);
        } else {
          if (activeDigitIndex === null) return;
          setUserInput(prev => { const n = [...prev]; n[activeDigitIndex] = ''; return n; });
        }
      };

      const handleCheckAnswer = () => {
        if (!currentQuestion) return;
        let userAnsNum = 0;
        let hasInput = false;
        for (let i = 0; i < currentQuestion.maxDigits; i++) {
          const val = userInput[i];
          if (val !== '') { hasInput = true; userAnsNum += parseInt(val) * Math.pow(10, i); }
        }
        if (!hasInput) return;

        if (userAnsNum === currentQuestion.answer) {
          playCorrect();
          setShowSuccess(true);

          const nextScore = score + 1;
          setScore(nextScore);

          if (isSpeedUp) setSpeedLevel(lvl => lvl + 1);

          // 一定速度で問題数制限あり → クリア判定
          const limit = !isSpeedUp && questionLimit !== null ? questionLimit : null;

          setTimeout(() => {
            setShowSuccess(false);
            if (limit !== null && nextScore >= limit) {
              // 全問クリア
              playClearSound();
              setIsCleared(true);
              setGameState('gameover');
            } else {
              generateQuestion();
            }
          }, 650);
        } else {
          playIncorrect();
          setFlashRed(true);
          setTimeout(() => setFlashRed(false), 400);
        }
      };

      // 筆算レンダリング
      const renderQuestionColumns = () => {
        if (!currentQuestion) return null;
        const { num1, num2, maxDigits } = currentQuestion;
        const d1 = num1.toString().split('').reverse();
        const d2 = num2.toString().split('').reverse();
        const gridTemplateColumns = `56px repeat(${maxDigits}, 72px)`;
        const columns = [{ type: 'operator' }];
        for (let i = maxDigits - 1; i >= 0; i--) columns.push({ type: 'digit', index: i });

        return (
          <div className="flex flex-col items-center tabular-numbers w-full select-none">
            {/* ヒント行 */}
            {showHint && (
              <div className="grid" style={{ gridTemplateColumns }}>
                <div />
                {columns.slice(1).map((col, idx) => {
                  const i = col.index;
                  let hintText = '';
                  if (currentQuestion.operator === '+') {
                    if (currentQuestion.carryInfo[i] > 0) hintText = currentQuestion.carryInfo[i];
                  } else if (currentQuestion.operator === '-') {
                    if (subHints.borrowTop[i]) hintText = subHints.borrowTop[i];
                    else if (subHints.reducedVal[i] !== null) hintText = subHints.reducedVal[i];
                  } else if (currentQuestion.operator === 'x') {
                    if (currentQuestion.carryInfo[i] > 0) hintText = currentQuestion.carryInfo[i];
                  }
                  return (
                    <div key={idx} className="h-6 flex items-end justify-center text-[#10B981] font-bold text-xl pb-1">{hintText}</div>
                  );
                })}
              </div>
            )}

            {/* 上の段 */}
            <div className="grid text-[#2D334E]" style={{ gridTemplateColumns }}>
              <div />
              {columns.slice(1).map((col, idx) => {
                const i = col.index;
                const val = d1[i] || '';
                const isSlashed = showHint && currentQuestion.operator === '-' && subHints.slashed[i];
                return (
                  <div key={idx} className="h-14 flex items-center justify-center text-5xl font-normal relative">
                    {val && (
                      <div className="relative">
                        <span className={isSlashed ? 'text-slate-300' : ''}>{val}</span>
                        {isSlashed && (
                          <svg className="absolute -inset-2 w-[140%] h-[140%] pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <line x1="15" y1="85" x2="85" y2="15" stroke="#EF4444" strokeWidth="5" strokeLinecap="round" />
                          </svg>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* 下の段 */}
            <div className="grid text-[#2D334E]" style={{ gridTemplateColumns }}>
              <div className="h-14 flex items-center justify-center text-4xl font-light">
                {currentQuestion.operator === 'x' ? '×' : currentQuestion.operator === '+' ? '＋' : '－'}
              </div>
              {columns.slice(1).map((col, idx) => {
                const i = col.index;
                return (
                  <div key={idx} className="h-14 flex items-center justify-center text-5xl font-normal">{d2[i] || ''}</div>
                );
              })}
            </div>

            {/* 横線 */}
            <div className="w-full border-b-[4px] border-[#2D334E] my-1 rounded-full" />

            {/* 解答欄 */}
            <div className="grid" style={{ gridTemplateColumns }}>
              <div />
              {columns.slice(1).map((col, idx) => {
                const i = col.index;
                const val = userInput[i];
                const isActive = answerMode === 'selectDigit' && activeDigitIndex === i;
                return (
                  <div key={idx}
                    onClick={() => { if (answerMode === 'selectDigit') setActiveDigitIndex(i); }}
                    className={`h-16 flex items-center justify-center p-0.5 ${answerMode === 'selectDigit' ? 'cursor-pointer' : 'cursor-default'}`}>
                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-5xl font-normal transition-all duration-150 ${
                      isActive
                        ? 'bg-amber-50 border-[3px] border-amber-400 text-amber-700 scale-105 shadow-inner'
                        : 'bg-white border-2 border-slate-200 text-[#2D334E]'
                    }`}>{val}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // 問題数制限の実効値
      const effectiveLimit = !isSpeedUp && questionLimit !== null ? questionLimit : null;

      return (
        <div id="root-inner">
          {/* 赤フラッシュ（全画面オーバーレイ） */}
          {flashRed && (
            <div className="fixed inset-0 bg-rose-500/15 pointer-events-none z-50 transition-opacity duration-200" />
          )}

          {/* ===== 設定画面 ===== */}
          {gameState === 'settings' && (
            <div id="settings-screen" className="flex flex-col items-center justify-center p-4">
              <div className="bg-white rounded-[32px] shadow-lg border-2 border-amber-100 p-6 w-full max-w-md">
                <div className="text-center mb-5">
                  <h1 className="text-3xl font-extrabold text-amber-600 tracking-wider flex items-center justify-center gap-2">
                    <span>🏃‍♂️</span> ひっ算シャトルラン
                  </h1>
                </div>

                <div className="space-y-4">
                  {/* 計算の種類（4つに） */}
                  <div>
                    <label className="block text-sm font-bold text-slate-500 mb-1.5 text-center">計算の種類</label>
                    <div className="grid grid-cols-2 gap-2">
                      {[
                        { op: '+', label: 'たす ＋' },
                        { op: '-', label: 'ひく －' },
                        { op: '+-', label: 'たす・ひく ＋－' },
                        { op: 'x', label: 'かける ×' }
                      ].map(item => (
                        <button type="button" key={item.op} onClick={() => setOperator(item.op)}
                          className={`py-2 px-1 rounded-2xl border-2 font-bold text-sm transition-all ${
                            operator === item.op
                              ? 'border-amber-400 text-amber-700 bg-amber-50/50 scale-105 shadow-sm'
                              : 'border-slate-100 text-slate-400 bg-slate-50/50 hover:bg-slate-100'
                          }`}>
                          {item.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* 数の範囲 */}
                  <div className="space-y-3 bg-amber-50/30 p-3.5 rounded-2xl border border-amber-100/50">
                    <div>
                      <h3 className="text-xs font-extrabold text-amber-700 mb-2 border-b border-amber-100 pb-0.5">上の段の数</h3>
                      <div className="flex justify-around items-center gap-2">
                        <NumberSelector label="最小" value={upperMin} onChange={handleUpperMinChange} min={1} max={999} />
                        <NumberSelector label="最大" value={upperMax} onChange={handleUpperMaxChange} min={1} max={999} />
                      </div>
                    </div>
                    <div className="border-t border-amber-100/40 pt-2.5 mt-1">
                      <h3 className="text-xs font-extrabold text-amber-700 mb-2 border-b border-amber-100 pb-0.5">下の段の数</h3>
                      <div className="flex justify-around items-center gap-2">
                        <NumberSelector label="最小" value={lowerMin} onChange={handleLowerMinChange} min={1} max={operator === 'x' ? 9 : 999} />
                        <NumberSelector label="最大" value={lowerMax} onChange={handleLowerMaxChange} min={1} max={operator === 'x' ? 9 : 999} />
                      </div>
                    </div>
                  </div>

                  {/* 答え方（左右逆に：左が「ケタをえらんで」、右が「いきなり入力」） */}
                  <div className="bg-slate-50/50 p-3 rounded-2xl border border-slate-100">
                    <label className="block text-sm font-bold text-slate-500 mb-2 text-center">答え方</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button type="button" onClick={() => setAnswerMode('selectDigit')}
                        className={`py-2 px-1 rounded-xl border-2 font-bold text-xs transition-all flex flex-col items-center justify-center min-h-[52px] ${
                          answerMode === 'selectDigit'
                            ? 'border-amber-400 text-amber-700 bg-amber-50/50'
                            : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                        }`}>
                        <span>ケタをえらんで答える</span>
                        <span className="text-[9px] font-normal text-slate-400 mt-0.5">(最初は選ばれていません)</span>
                      </button>
                      <button type="button" onClick={() => setAnswerMode('directInput')}
                        className={`py-2 px-1 rounded-xl border-2 font-bold text-xs transition-all flex flex-col items-center justify-center min-h-[52px] ${
                          answerMode === 'directInput'
                            ? 'border-amber-400 text-amber-700 bg-amber-50/50'
                            : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                        }`}>
                        <span>ケタを選ばずに</span>
                        <span className="text-[9px] font-normal text-slate-400 mt-0.5">いきなり入力する</span>
                      </button>
                    </div>
                  </div>

                  {/* スピード設定 */}
                  <div className="bg-slate-50/50 p-2.5 rounded-2xl border border-slate-100">
                    <label className="block text-sm font-bold text-slate-500 mb-1.5 text-center">スピードの設定</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button type="button" onClick={() => setIsSpeedUp(true)}
                        className={`py-2 rounded-xl border-2 font-bold text-xs transition-all ${
                          isSpeedUp ? 'border-amber-400 text-amber-700 bg-amber-50/50' : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                        }`}>正解でだんだん速く</button>
                      <button type="button" onClick={() => setIsSpeedUp(false)}
                        className={`py-2 rounded-xl border-2 font-bold text-xs transition-all ${
                          !isSpeedUp ? 'border-amber-400 text-amber-700 bg-amber-50/50' : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                        }`}>正解でも一定速度</button>
                    </div>

                    {/* 一定速度のときのみ問題数設定を表示 */}
                    {!isSpeedUp && (
                      <div className="mt-2.5 pt-2.5 border-t border-slate-100">
                        <label className="block text-xs font-bold text-slate-500 mb-2 text-center">問題数</label>
                        <div className="flex gap-2">
                          {/* 問題数あり：5, 10, 15, 20 のプリセット */}
                          {[5, 10, 15, 20].map(n => (
                            <button type="button" key={n} onClick={() => setQuestionLimit(n)}
                              className={`flex-1 py-1.5 rounded-xl border-2 font-bold text-xs transition-all ${
                                questionLimit === n
                                  ? 'border-amber-400 text-amber-700 bg-amber-50/50'
                                  : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                              }`}>{n}問</button>
                          ))}
                          <button type="button" onClick={() => setQuestionLimit(null)}
                            className={`flex-1 py-1.5 rounded-xl border-2 font-bold text-xs transition-all ${
                              questionLimit === null
                                ? 'border-amber-400 text-amber-700 bg-amber-50/50'
                                : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                            }`}>∞</button>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* タイマーバー表示 */}
                  <div className="bg-slate-50/50 p-2.5 rounded-2xl border border-slate-100">
                    <label className="block text-sm font-bold text-slate-500 mb-1.5 text-center">タイマーバーの表示</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button type="button" onClick={() => setShowProgressBar(true)}
                        className={`py-2 rounded-xl border-2 font-bold text-xs transition-all ${
                          showProgressBar ? 'border-amber-400 text-amber-700 bg-amber-50/50' : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                        }`}>あり</button>
                      <button type="button" onClick={() => setShowProgressBar(false)}
                        className={`py-2 rounded-xl border-2 font-bold text-xs transition-all ${
                          !showProgressBar ? 'border-amber-400 text-amber-700 bg-amber-50/50' : 'border-slate-100 text-slate-400 bg-white hover:bg-slate-100'
                        }`}>なし</button>
                    </div>
                  </div>
                </div>

                <button type="button" onClick={startGame}
                  className="w-full mt-4 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold text-xl rounded-2xl shadow-md border-b-4 border-amber-700 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                  スタート！
                </button>
              </div>
            </div>
          )}

          {/* ===== ゲーム画面 ===== */}
          {gameState === 'playing' && (
            <div id="game-screen" className="w-full">
              <div className="flex flex-col h-full max-w-md mx-auto px-3"
                   style={{ paddingTop: 'env(safe-area-inset-top, 8px)', paddingBottom: 'env(safe-area-inset-bottom, 8px)' }}>

                {/* ヘッダー */}
                <div className="flex items-center justify-between flex-shrink-0 py-2">
                  <button type="button" onClick={() => setGameState('settings')}
                    className="text-slate-400 hover:text-slate-600 text-3xl leading-none p-1" title="もどる">⚙️</button>

                  <div className="flex space-x-1.5 py-1">
                    {[1, 2, 3].map(heartIdx => (
                      <div key={heartIdx} className="transition-transform duration-300">
                        {heartIdx <= (3 - lostCount) ? (
                          <svg className="w-7 h-7 text-[#FFB3C6] filter drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20">
                            <path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" />
                          </svg>
                        ) : (
                          <svg className="w-7 h-7 text-[#DDD6C8]" fill="currentColor" viewBox="0 0 20 20">
                            <path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" />
                          </svg>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* スコア（一定速度＋問題数あり → 残り問題数も表示） */}
                  <div className="text-2xl font-extrabold text-amber-700 leading-none text-right">
                    {effectiveLimit !== null ? (
                      <div className="flex flex-col items-end">
                        <span>{score}<span className="text-sm font-bold text-slate-500 ml-1">問</span></span>
                        <span className="text-xs font-bold text-slate-400">/ {effectiveLimit}問</span>
                      </div>
                    ) : (
                      <span>{score}<span className="text-sm font-bold text-slate-500 ml-1">問</span></span>
                    )}
                  </div>
                </div>

                {/* タイマーバー */}
                {showProgressBar && (
                  <div className="w-full bg-slate-200/50 h-2 rounded-full overflow-hidden mb-1 flex-shrink-0">
                    <div className="bg-amber-400 h-full transition-all duration-100 ease-linear rounded-full"
                      style={{ width: `${(beatCount / 10) * 100}%` }} />
                  </div>
                )}

                {/* 筆算エリア（flex-1 で余白を均等に使う） */}
                <div className="flex-1 flex items-center justify-center min-h-0 py-1">
                  <div className="bg-white rounded-[28px] border border-amber-100/30 shadow-[0_8px_32px_rgba(180,160,140,0.12)] px-6 py-4 flex items-center justify-center">
                    {renderQuestionColumns()}
                  </div>
                </div>

                {/* テンキーエリア */}
                <div className="flex-shrink-0 pb-1">
                  {hasHint && (
                    <div className="mb-2">
                      <button type="button" onClick={() => setShowHint(!showHint)}
                        className={`px-4 h-9 rounded-xl bg-white border border-slate-200/50 shadow-sm font-bold text-sm flex items-center gap-1.5 transition-all ${
                          showHint ? 'text-[#10B981] border-[#10B981]' : 'text-amber-500 hover:bg-slate-50'
                        }`}>
                        <span className="text-base">💡</span>ヒント
                      </button>
                    </div>
                  )}

                  <div className="grid grid-cols-3 gap-2">
                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                      <button type="button" key={num} onClick={() => handleNumberInput(num)}
                        className="key-button bg-white hover:bg-slate-50 rounded-2xl text-4xl font-normal text-[#323854] shadow-[0_4px_0_#E8DFCC] border border-slate-100"
                        style={{ height: 'clamp(60px, 10dvh, 84px)' }}>
                        {num}
                      </button>
                    ))}
                    <button type="button" onClick={handleClear}
                      className="key-button bg-[#7AC5CD] hover:bg-[#6CB3BA] text-white rounded-2xl text-2xl font-bold shadow-[0_4px_0_#5F9EAE]"
                      style={{ height: 'clamp(60px, 10dvh, 84px)' }}>けす</button>
                    <button type="button" onClick={() => handleNumberInput(0)}
                      className="key-button bg-white hover:bg-slate-50 rounded-2xl text-4xl font-normal text-[#323854] shadow-[0_4px_0_#E8DFCC] border border-slate-100"
                      style={{ height: 'clamp(60px, 10dvh, 84px)' }}>0</button>
                    <button type="button" onClick={handleCheckAnswer}
                      className="key-button bg-[#59BA73] hover:bg-[#4CA564] text-white rounded-2xl text-2xl font-bold shadow-[0_4px_0_#439257]"
                      style={{ height: 'clamp(60px, 10dvh, 84px)' }}>OK</button>
                  </div>
                </div>

              </div>
            </div>
          )}

          {/* ===== ゲームオーバー / クリア画面 ===== */}
          {gameState === 'gameover' && (
            <div id="gameover-screen" className="flex flex-col items-center justify-center p-4">
              <div className="bg-white rounded-[32px] shadow-lg border-2 border-amber-100 p-8 w-full max-w-md text-center">
                {isCleared ? (
                  <>
                    <div className="text-5xl mb-3">🎉</div>
                    <h2 className="text-3xl font-extrabold text-amber-500 mb-1">ぜんぶできた！</h2>
                    <p className="text-slate-400 text-sm mb-4">{effectiveLimit}問クリア！すごい！</p>
                  </>
                ) : (
                  <h2 className="text-3xl font-extrabold text-amber-600 mb-4">がんばったね♪</h2>
                )}

                <div className="bg-amber-50/50 rounded-2xl p-6 mb-6 border border-amber-100/50">
                  <div className="text-4xl font-extrabold text-[#303550]">
                    {score} <span className="text-2xl font-bold">問正解♪</span>
                  </div>
                </div>

                <div className="space-y-3">
                  <button type="button" onClick={startGame}
                    className="w-full py-4 bg-amber-500 text-white text-xl font-bold rounded-2xl shadow-md border-b-4 border-amber-700 hover:bg-amber-600 transition-all">
                    もういちど！
                  </button>
                  <button type="button" onClick={() => setGameState('settings')}
                    className="w-full py-3 bg-slate-100 text-slate-500 text-lg font-bold rounded-2xl hover:bg-slate-200 transition-all">
                    設定にもどる
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
